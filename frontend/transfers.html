<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="\backend\transfers.js">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Transfers</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}



header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:600;
background:#111;
letter-spacing:1px;
}



.container{
display:flex;
}



.sidebar{
width:220px;
height:100vh;
background:#111;
padding-top:30px;
}

.sidebar a{

display:block;
padding:15px 20px;
color:white;
text-decoration:none;
font-size:15px;
transition:.3s;

}

.sidebar a:hover{

background:#1e90ff;
padding-left:30px;

}



.main{
flex:1;
padding:30px;
}
.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;

}

.card{

background:white;
color:black;
padding:25px;
border-radius:10px;
text-align:center;
transition:.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.3);

}

.card:hover{
transform:translateY(-10px);
}



table{

width:100%;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
border-collapse:collapse;

}

th{

background:#111;
color:white;
padding:12px;

}

td{

padding:10px;
text-align:center;
border-bottom:1px solid #ddd;

}

tr:hover{

background:#f4f4f4;

}



.ok{
color:green;
font-weight:bold;
}

.low{
color:orange;
font-weight:bold;
}

.out{
background:red;
color:white;
padding:4px 10px;
border-radius:5px;
}



button{

padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin:2px;

}

button:first-child{
background:#2ecc71;
color:white;
}

button:last-child{
background:#e74c3c;
color:white;
}



#search{

padding:8px;
margin:15px 0;
border-radius:5px;
border:none;

}



.chartBox{

width:100%;
background:white;
padding:20px;
border-radius:10px;

}</style>
</head>

<body>

<header>
CoreInventory Management System
</header>

<div class="container">

<div class="sidebar">
<a href="index.html">🏠 Dashboard</a>
<a href="products.html">📦 Products</a>
<a href="receipts.html">📥 Receipts</a>
<a href="deliveries.html">🚚 Deliveries</a>
<a href="transfers.html">🔄 Transfers</a>
<a href="settings.html">⚙ Settings</a>
</div>

<div class="main">

<h2>Transfers</h2>

<table>

<tr>
<th>ID</th>
<th>Product</th>
<th>From Warehouse</th>
<th>To Warehouse</th>
<th>Quantity</th>
</tr>

<tr>
<td>1</td>
<td>Steel Rods</td>
<td>Warehouse A</td>
<td>Warehouse B</td>
<td>60</td>
</tr>

<tr>
<td>2</td>
<td>Aluminum Sheets</td>
<td>Warehouse B</td>
<td>Warehouse C</td>
<td>25</td>
</tr>

</table>

</div>

</div>

</body>
</html>
